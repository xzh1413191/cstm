  <script>
    (() => {
      const root = document.getElementById('malaysia-customer-master');
      const rows = JSON.parse(root.querySelector('#mcm-data').textContent);
      const body = root.querySelector('#mcm-body');
      const search = root.querySelector('#mcm-search');
      const tier = root.querySelector('#mcm-tier');
      const track = root.querySelector('#mcm-track');
      const action = root.querySelector('#mcm-action');
      const contact = root.querySelector('#mcm-contact');
      const route = root.querySelector('#mcm-route-filter');
      const empty = root.querySelector('#mcm-empty');
      const esc = value => String(value || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
      const href = value => /^(https?:\/\/)/i.test(value || '') ? value : '';
      const mail = value => (value || '').split(/[;,\s]+/).find(v => v.includes('@')) || '';
      const phone = value => (value || '').replace(/[^+\d]/g, '');
      const pills = value => (value || '').split(';').filter(Boolean).map(v => `<span class="pill">${esc(v.trim().replaceAll('_',' '))}</span>`).join('');
      const detail = (primary, secondary) => `${esc(primary)}${secondary ? `<span class="sub">${esc(secondary)}</span>` : ''}`;
      const photoPaths = value => (value || '').split(';').map(v => v.trim()).filter(v => /^assets\//.test(v));

      function companyHtml(row) {
        const photos = photoPaths(row.photo_paths).slice(0, 3);
        const gallery = photos.length ? `<div class="photo-strip">${photos.map((src, index) => `<a href="${esc(src)}" target="_blank" rel="noreferrer" aria-label="查看 ${esc(row.company)} 现场照片 ${index + 1}"><img class="customer-photo" src="${esc(src)}" alt="${esc(row.company)} 现场产品照片" loading="lazy"></a>`).join('')}</div>` : '';
        return `<div class="company-wrap">${gallery}<div>${detail(row.company, row.sources)}</div></div>`;
      }

      function contactHtml(row) {
        const pieces = [];
        if (row.phone) { const p = phone(row.phone); pieces.push(p ? `<a href="tel:${esc(p)}">${esc(row.phone)}</a>` : esc(row.phone)); }
        if (row.email) { const e = mail(row.email); pieces.push(e ? `<a href="mailto:${esc(e)}">${esc(row.email)}</a>` : esc(row.email)); }
        if (row.website) { const url = href(row.website.split(';')[0].trim()); pieces.push(url ? `<a href="${esc(url)}" target="_blank" rel="noreferrer">官网</a>` : esc(row.website)); }
        return pieces.join('<span class="sub"></span>') || '<span class="sub">待补负责人联系方式</span>';
      }

      function routeHtml(row) {
        const pieces = [];
        if (row.address) pieces.push(esc(row.address));
        if (row.route_area) pieces.push(`<span class="sub">${esc(row.route_area)}${row.route_seq ? ' · ' + esc(row.route_seq) : ''}</span>`);
        if (row.maps) { const url = href(row.maps.split(';')[0].trim()); if (url) pieces.push(`<span class="sub"><a href="${esc(url)}" target="_blank" rel="noreferrer">打开地图</a></span>`); }
        return pieces.join('') || '<span class="sub">地点待核实</span>';
      }

      function rowHtml(row) {
        const fit = [row.customer_type, row.fit_product].filter(Boolean).join(' · ');
        const progress = [row.contact_status, row.followup_status, row.next_action].filter(Boolean).join(' · ');
        return `<tr>
          <td class="company" data-label="公司">${companyHtml(row)}</td>
          <td class="tier" data-label="等级">${pills(row.final_tier)}${pills(row.priority_action)}<span class="sub">${esc(row.data_confidence)} confidence</span></td>
          <td class="typefit" data-label="客户类型 / 适配产品">${detail(fit, row.size_class)}<span class="sub">${pills(row.channel_track)}</span></td>
          <td class="contact" data-label="联系方式">${contactHtml(row)}</td>
          <td class="route" data-label="地点 / 路线">${routeHtml(row)}</td>
          <td class="progress" data-label="进度 / 下一步">${detail(progress, row.review_status)}${row.gmail_draft_id ? '<span class="sub">Gmail draft: ' + esc(row.gmail_draft_id) + '</span>' : ''}</td>
        </tr>`;
      }

      function matches(row) {
        const q = search.value.trim().toLowerCase();
        if (q && !Object.values(row).join(' ').toLowerCase().includes(q)) return false;
        if (tier.value && row.tier_group !== tier.value) return false;
        if (track.value && !row.channel_track.split(';').map(v => v.trim()).includes(track.value)) return false;
        if (action.value && row.priority_action !== action.value) return false;
        if (route.value && row.route_included !== route.value) return false;
        const hasPhone = Boolean(row.phone);
        const hasEmail = Boolean(row.email);
        if (contact.value === 'contactable' && !(hasPhone || hasEmail)) return false;
        if (contact.value === 'phone' && !hasPhone) return false;
        if (contact.value === 'email' && !hasEmail) return false;
        if (contact.value === 'missing' && (hasPhone || hasEmail)) return false;
        return true;
      }

      function render() {
        const filtered = rows.filter(matches);
        body.innerHTML = filtered.map(rowHtml).join('');
        empty.hidden = filtered.length !== 0;
        root.querySelector('#mcm-visible').textContent = filtered.length;
        root.querySelector('#mcm-context').textContent = filtered.length === rows.length ? '（完整总库）' : '（已筛选）';
        root.querySelectorAll('.tier-chip').forEach(btn => btn.classList.toggle('is-active', btn.dataset.tier === tier.value));
      }

      root.querySelector('#mcm-total').textContent = rows.length;
      root.querySelector('#mcm-priority').textContent = rows.filter(r => ['T0','T1'].includes(r.tier_group)).length;
      root.querySelector('#mcm-contactable').textContent = rows.filter(r => r.phone || r.email).length;
      root.querySelector('#mcm-route').textContent = rows.filter(r => r.route_included === 'Yes').length;
      [search, tier, track, action, contact, route].forEach(control => control.addEventListener(control === search ? 'input' : 'change', render));
      root.querySelectorAll('.tier-chip').forEach(btn => btn.addEventListener('click', () => { tier.value = btn.dataset.tier; render(); }));
      root.querySelector('#mcm-reset').addEventListener('click', () => {
        search.value = ''; tier.value = ''; track.value = ''; action.value = ''; contact.value = ''; route.value = ''; render();
      });
      render();
    })();
  </script>
